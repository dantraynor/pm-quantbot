name: CI

on:
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, signal-core]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.service }}
      - name: Check
        run: cargo check
        working-directory: ${{ matrix.service }}
      - name: Build
        run: cargo build --release
        working-directory: ${{ matrix.service }}
      - name: Test
        run: cargo test
        working-directory: ${{ matrix.service }}

  build-typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [execution, settlement, btc-5m]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - name: Install shared
        run: npm ci
        working-directory: shared
      - name: Install
        run: npm ci
        working-directory: ${{ matrix.service }}
      - name: Build
        run: npm run build
        working-directory: ${{ matrix.service }}

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install and build
        env:
          DASHBOARD_API_SECRET: ci_placeholder_secret_min_len_16
        run: npm ci && npm run build
        working-directory: dashboard

  build-docker:
    runs-on: ubuntu-latest
    needs: [build-rust, build-typescript, build-dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml build
